{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Macrox — Validador de Nutrición Inteligente</title>
    
    <meta name="description" content="Filtro clasificador con IA de Macrox para validación de contenido de alimentos y macronutrientes.">
    <meta name="author" content="Macrox AI">
    <meta name="robots" content="noindex, nofollow"> <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/mixins/_banner.scss" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/macrox.css' %}">
</head>
<body class="bg-macrox-dark text-light d-flex align-items-center min-vh-100">
    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6 text-center">
                <div class="mb-4">
                    <img src="{% static 'images/logo_macrox_one.png' %}" alt="Logo Macrox" class="img-fluid logo-macrox">
                </div>
                <h1 class="h3 mb-5 fw-normal text-macrox-muted">¿Qué comiste hoy?</h1>
                <form id="validator-form" method="POST" action="{% url 'validator' %}">
                    {% csrf_token %}
                    <div class="position-relative">
                        <textarea 
                            name="text_input" 
                            id="text_input" 
                            rows="3" 
                            class="form-control bg-macrox-input text-light border-1 rounded-4 pe-5 custom-textarea" 
                            placeholder="Escribe aquí los alimentos, recetas o cantidades de tu comida..."
                            required></textarea>
                        <button type="submit" class="btn btn-macrox-action rounded-circle position-absolute bottom-0 end-0 m-2 d-flex align-items-center justify-content-center">
                            <span class="material-icons">send</span>
                        </button>
                    </div>
                </form>
                <div id="result-container" class="mt-4 d-none">
                    <div id="result-alert" class="alert d-flex align-items-center justify-content-start rounded-4 border-0 p-3 shadow-sm text-start" role="alert">
                        <span id="result-icon" class="material-icons me-3"></span>
                    <div>
                        <strong id="result-title" class="d-block mb-1"></strong>
                        <span id="result-text" class="small opacity-90"></span>
                    </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<script>
document.getElementById('validator-form').addEventListener('submit', async function(e) {
    e.preventDefault(); // Evita que la página se recargue

    const form = e.target;
    const formData = new FormData(form);
    const textInput = document.getElementById('text_input');
    const submitBtn = form.querySelector('button[type="submit"]');
    const submitIcon = submitBtn.querySelector('.material-icons');
    
    const container = document.getElementById('result-container');
    const alertBox = document.getElementById('result-alert');
    const resIcon = document.getElementById('result-icon');
    const resTitle = document.getElementById('result-title');
    const resText = document.getElementById('result-text');

    //Estado de Carga (Feedback visual en el botón)
    submitBtn.disabled = true;
    submitIcon.innerText = 'sync'; // Cambia el icono de enviar por uno de carga
    submitIcon.classList.add('spin-animation'); // Efecto de rotación

    try {
        //Llamada asíncrona a la  URL de Django
        const response = await fetch(form.action, {
            method: 'POST',
            body: formData,
            headers: {
                'X-Requested-With': 'XMLHttpRequest'
            }
        });

        const data = await response.json();

        // Procesar la respuesta del JSON de MacroX
        container.classList.remove('d-none'); // Mostramos el contenedor
        
        if (data.is_food) {
            //Estilo 'Success': Fondo verde oscuro mate con texto claro
            alertBox.className = "alert alert-success d-flex align-items-center justify-content-start rounded-4 border-0 p-3 shadow-sm text-start bg-success bg-opacity-10 text-success";
            resIcon.innerText = 'check_circle';
            resTitle.innerText = `Contenido Válido`;
            resText.innerText = data.message;
        } else {
            //Estilo Unsuccess: Fondo rojo oscuro mate con texto claro
            alertBox.className = "alert alert-danger d-flex align-items-center justify-content-start rounded-4 border-0 p-3 shadow-sm text-start bg-opacity-10 text-danger";
            resIcon.innerText = 'error';
            resTitle.innerText = `Contenido No Válido`;
            resText.innerText = data.message;
        }

    } catch (error) {
        //Manejo de errores de conexión o del servidor
        container.classList.remove('d-none');
        alertBox.className = "alert alert-warning d-flex align-items-center justify-content-start rounded-4 border-0 p-3 shadow-sm text-start bg-warning bg-opacity-10 text-warning";
        resIcon.innerText = 'warning';
        resTitle.innerText = 'Error de comunicación';
        resText.innerText = 'No se pudo conectar con el servidor de MacroX AI.';
    } finally {
        //Restaurar el botón a su estado original
        submitBtn.disabled = false;
        submitIcon.innerText = 'send';
        submitIcon.classList.remove('spin-animation');
    }
});
</script>
